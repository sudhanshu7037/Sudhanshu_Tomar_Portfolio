<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Premium Neon Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Gradient for the text/path -->
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#46F5B4" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>
  </defs>
  
  <!-- Outer Hexagon Frame -->
  <polygon points="256,30 450,142 450,370 256,482 62,370 62,142" stroke="url(#cyberGradient)" stroke-width="24" stroke-linejoin="round" fill="#030712" />
  
  <!-- Outer Glow Ring -->
  <polygon points="256,45 435,150 435,362 256,467 77,362 77,150" stroke="#46F5B4" stroke-width="4" stroke-linejoin="round" opacity="0.4" filter="url(#glow)" />

  <!-- Stylized Cybernetic "S" -->
  <path d="M350 170 H220 C190 170 180 195 180 215 C180 245 205 250 230 250 H282 C315 250 332 265 332 295 C332 325 315 342 282 342 H162" stroke="url(#cyberGradient)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M350 170 H220 C190 170 180 195 180 215 C180 245 205 250 230 250 H282 C315 250 332 265 332 295 C332 325 315 342 282 342 H162" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>